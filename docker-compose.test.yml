services:
  neo4j-test:
    image: neo4j:5.26-community
    container_name: memfs-neo4j-test
    ports:
      - "7688:7687"   # Bolt on 7688 (prod is 7687)
      - "7475:7474"   # HTTP on 7475 (prod is 7474)
    environment:
      NEO4J_AUTH: neo4j/memfsdev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    # Intentionally NO persistent volume — test DB is ephemeral.
    # On container restart the schema is recreated fresh by create_db().
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
